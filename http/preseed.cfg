### Localization
d-i debian-installer/language string en
d-i debian-installer/country string US
d-i debian-installer/locale string en_US.UTF-8
d-i debian-installer/exit/reboot boolean true
d-i debian-installer/exit/poweroff boolean false

### Keyboard selection
d-i keyboard-configuration/xkb-keymap select us
d-i keyboard-configuration/layout select us
d-i keyboard-configuration/variant select us

### Network configuration
d-i netcfg/choose_interface select auto
d-i netcfg/dhcp_timeout string 60
d-i netcfg/get_hostname string kali
d-i netcfg/get_domain string localdomain

### Mirror settings
d-i mirror/country string manual
d-i mirror/http/hostname string http.kali.org
d-i mirror/http/directory string /kali
d-i mirror/suite string kali-rolling
d-i mirror/http/proxy string

### Account setup (Using Kali User)
d-i passwd/user-fullname string Kali User
d-i passwd/username string kali
d-i passwd/user-password password kali
d-i passwd/user-password-again password kali
d-i user-setup/allow-password-weak boolean true
d-i user-setup/encrypt-home boolean false
d-i passwd/make-user boolean true

### Clock and time zone setup
d-i clock-setup/utc boolean true
d-i time/zone string UTC
d-i clock-setup/ntp boolean true

### Partitioning
d-i partman-auto/method string regular
d-i partman-lvm/device_remove_lvm boolean true
d-i partman-md/device_remove_md boolean true
d-i partman-auto/choose_recipe select atomic
d-i partman-partitioning/confirm_write_new_label boolean true
d-i partman/choose_partition select finish
d-i partman/confirm boolean true
d-i partman/confirm_nooverwrite boolean true

### Package selection
tasksel tasksel/first multiselect standard
d-i pkgsel/include string sudo curl wget openssh-server
d-i pkgsel/upgrade select none
popularity-contest popularity-contest/participate boolean false

### Hardware & Bootloader
d-i hw-detect/load_firmware boolean true
d-i debian-installer/sound-card-not-detected note
d-i grub-installer/only_debian boolean true
d-i grub-installer/with_other_os boolean false
d-i grub-installer/bootdev string /dev/sda
d-i grub-installer/timeout string 1

# Preventing Service Restarts Prompts

d-i libraries/restart-without-asking boolean true
d-i libpam0g/restart-services string cron

### Vagrant Customization (Late Command)
# 1. Setup Passwordless Sudo for Kali User
# 2. Setup SSH directory and authorized_keys with the Vagrant insecure public key
d-i preseed/late_command string \
    in-target /bin/sh -c 'echo "kali ALL=(ALL) NOPASSWD:ALL" > /etc/sudoers.d/kali'; \
    in-target /bin/sh -c 'chmod 440 /etc/sudoers.d/kali'; \
    in-target /bin/sh -c 'mkdir -p /home/kali/.ssh'; \
    in-target /bin/sh -c 'curl -fsSL https://raw.githubusercontent.com/hashicorp/vagrant/master/keys/vagrant.pub -o /home/kali/.ssh/authorized_keys'; \
    in-target /bin/sh -c 'chown -R kali:kali /home/kali/.ssh'; \
    in-target /bin/sh -c 'chmod 700 /home/kali/.ssh'; \
    in-target /bin/sh -c 'chmod 600 /home/kali/.ssh/authorized_keys'; \
    in-target /bin/sh -c 'systemctl enable ssh'; \
    in-target /bin/sh -c 'rm -f /etc/ssh/ssh_host_*'; \
    in-target /bin/sh -c 'ssh-keygen -A'; \
    in-target /bin/sh -c 'sleep 2 && /sbin/shutdown -r now'

### Finishing up the installation
# Skip the "Installation Complete" dialog and reboot automatically
d-i finish-install/reboot_in_progress note
d-i debian-installer/exit/poweroff boolean false
